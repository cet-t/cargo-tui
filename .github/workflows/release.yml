name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            npm_pkg: win32-x64
            bin: cargo-tui.exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            npm_pkg: linux-x64
            bin: cargo-tui

          - os: macos-latest
            target: x86_64-apple-darwin
            npm_pkg: darwin-x64
            bin: cargo-tui

          - os: macos-latest
            target: aarch64-apple-darwin
            npm_pkg: darwin-arm64
            bin: cargo-tui

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm_pkg }}
          path: target/${{ matrix.target }}/release/${{ matrix.bin }}

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Write auth token directly to ~/.npmrc — more reliable than setup-node's
      # ${NODE_AUTH_TOKEN} placeholder expansion (which fails with npm 10+).
      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Place each binary into its npm package directory
      - name: Stage binaries
        run: |
          for pkg in win32-x64 linux-x64 darwin-x64 darwin-arm64; do
            mkdir -p npm/$pkg/bin
            cp artifacts/$pkg/* npm/$pkg/bin/
            chmod +x npm/$pkg/bin/* 2>/dev/null || true
          done

      # Rewrite versions in all package.json files to match the git tag (without leading "v")
      - name: Set version
        run: |
          # Strip leading "v": "v0.1.3" -> "0.1.3", then export for node
          VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$VERSION" node -e "
            const fs = require('fs');
            const ver = process.env.PKG_VERSION;
            const files = [
              'package.json',
              'npm/win32-x64/package.json',
              'npm/linux-x64/package.json',
              'npm/darwin-x64/package.json',
              'npm/darwin-arm64/package.json',
            ];
            for (const f of files) {
              const p = JSON.parse(fs.readFileSync(f, 'utf8'));
              p.version = ver;
              if (p.optionalDependencies)
                Object.keys(p.optionalDependencies).forEach(k => p.optionalDependencies[k] = ver);
              fs.writeFileSync(f, JSON.stringify(p, null, 2) + '\n');
            }
          "

      # Publish platform packages first, wait for propagation, then publish root.
      - name: Publish to npm
        run: |
          for pkg in win32-x64 linux-x64 darwin-x64 darwin-arm64; do
            npm publish ./npm/$pkg --access public
          done
          echo "Waiting 30s for registry propagation..."
          sleep 30
          npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
